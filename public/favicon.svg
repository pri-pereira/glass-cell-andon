<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8d4e8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)" />

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#vwGrad)" stroke-width="3.5" />

  <!-- Inner ring -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="url(#vwGrad)" stroke-width="2" />

  <!-- VW Logo paths (classic VW mark) -->
  <!-- V shape (top) -->
  <path d="M36 26 L50 52 L64 26" fill="none" stroke="url(#vwGrad)" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round" />

  <!-- W shape (bottom) -->
  <path d="M30 38 L38 58 L50 44 L62 58 L70 38" fill="none" stroke="url(#vwGrad)" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round" />

  <!-- Divider line between V and W -->
  <line x1="37" y1="52" x2="63" y2="52" stroke="url(#vwGrad)" stroke-width="1.5" />
</svg>
